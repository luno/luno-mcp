name: Release

on:
  release:
    types: [published]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          go build -ldflags="-s -w" -o luno-mcp ./cmd/server
          tar czf luno-mcp-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz luno-mcp

      - uses: actions/upload-artifact@v4
        with:
          name: luno-mcp-${{ matrix.goos }}-${{ matrix.goarch }}
          path: luno-mcp-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  publish:
    name: Publish Release Assets
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        working-directory: dist
        run: sha256sum -- ./*.tar.gz > checksums.txt

      - name: Upload assets to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: dist/*

      - name: Trigger Homebrew tap update
        continue-on-error: true
        uses: peter-evans/repository-dispatch@ff45666b9427631e3450c54a1bcbee4d9ff4d7c0 # v3.0.0
        with:
          token: ${{ secrets.HOMEBREW_TAP_PAT }}
          repository: luno/homebrew-luno-mcp
          event-type: new-release
          client-payload: '{"version": "${{ github.event.release.tag_name }}"}'

      # Docker is published automatically by docker-publish.yml, which triggers on v* tag pushes.
